---
- name: Generate and deploy registry secrets and pull-secret.json
  hosts: localhost
  gather_facts: no
  vars_files:
    - variables.yaml
  vars:  
    # Target directory on the remote server
    secret_dir: "/var/containers/registry-service"

    # Path to the actual htpasswd file mapped into the registry container
    registry_htpasswd_file: "/var/registry/cluster-registry/auth/htpasswd"    

  vars_prompt:
    - name: registry_user_name
      prompt: "Enter Registry User"
      default: "{{ lookup('file', '.variable_registry_user_name', errors='ignore') | default('', true) | trim }}"
      private: no

    - name: registry_user_password
      prompt: "Enter Registry User Password"
      default: "{{ lookup('file', '.variable_registry_user_password', errors='ignore') | default(lookup('pipe', \"openssl rand -base64 48 | tr -dc 'a-zA-Z0-9' | fold -w 4 | head -n 4 | paste -sd '-' -\"), true) | trim }}"
      private: yes

  tasks:
    # 1. Save entered values to local cache files for future runs
    - name: Save entered values to local cache files
      ansible.builtin.copy:
        content: "{{ item.value }}"
        dest: "{{ item.dest }}"
        mode: "0600"
      loop:
        - { value: "{{ registry_user_name }}",   dest: ".variable_registry_user_name" }
        - { value: "{{ registry_user_password }}", dest: ".variable_registry_user_password" }
      loop_control:
        label: "{{ item.dest }}"

    # 2. Ensure the target directory exists on the remote server (requires root)
    - name: Ensure target directory exists on remote server
      ansible.builtin.file:
        path: "{{ secret_dir }}"
        state: directory
        mode: "0750"
      delegate_to: "{{ registry_hostname }}"
      become: yes 

    # 3. Generate the secret files directly on the server in Base64 format
    - name: Create Base64 encoded secret files on the target server
      ansible.builtin.copy:
        content: "{{ item.value | b64encode }}"
        dest: "{{ secret_dir }}/{{ item.filename }}"
        mode: "0600" # Crucial: Only root can read these files
      loop:
        - { value: "{{ registry_user_name }}",     filename: ".REGISTRY_USER_NAME" }
        - { value: "{{ registry_user_password }}", filename: ".REGISTRY_USER_PASSWORD" }
      loop_control:
        label: "{{ item.filename }}"
      delegate_to: "{{ registry_hostname }}"
      become: yes

    # 3.4 Check if the htpasswd file already exists
    - name: Check if htpasswd file exists on the registry server..
      ansible.builtin.stat:
        path: "{{ registry_htpasswd_file }}"
      register: htpasswd_stat
      delegate_to: "{{ registry_hostname }}"
      become: yes

    # 3.5 UPDATE LIVE REGISTRY (Zero-Downtime)
    - name: Update htpasswd file on the registry server..
      ansible.builtin.shell: |
        set -o pipefail
        # Přidali jsme -B pro vynucení Bcryptu
        echo "{{ registry_user_password | trim }}" | htpasswd -Bbi {{ registry_htpasswd_file }} {{ registry_user_name | trim }}
      delegate_to: "{{ registry_hostname }}"
      become: yes
      no_log: yes
      when: htpasswd_stat.stat.exists
      notify: Restart Registry Service

    # 4. Generate the base64 encoded "username:password" string for Docker config
    - name: Generate auth string for Docker config
      ansible.builtin.set_fact:
        registry_auth_string: "{{ (registry_user_name ~ ':' ~ registry_user_password) | b64encode }}"

    # 5. Define the pull-secret.json structure as a variable
    - name: Generate pull-secret.json data structure into a variable..
      ansible.builtin.set_fact:
        registry_pull_secret_data: >
          {{
            {
              "auths": {
                registry_url: {
                  "auth": registry_auth_string
                }
              }
            }
          }}

    # 6. Create pull-secret.json on the remote server
    - name: Create pull-secret.json on the remote server
      ansible.builtin.copy:
        content: "{{ registry_pull_secret_data | to_nice_json }}\n"
        dest: "{{ secret_dir }}/pull-secret.json"
        mode: "0600"
      delegate_to: "{{ registry_hostname }}"
      become: yes

    # 7. Create pull-secret.json locally (in the playbook directory)
    - name: Save pull-secret.json locally
      ansible.builtin.copy:
        content: "{{ registry_pull_secret_data | to_nice_json }}\n"
        dest: "{{ playbook_dir }}/pull-secret.json"
        mode: "0600"

    # 8. Update REGISTRY_URL variable in registry scripts..
    - name: Update REGISTRY_URL in registry shell scripts..
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        # Match the line starting with REGISTRY_URL= (ignoring the current value)
        regexp: '^REGISTRY_URL=.*'
        # Replace it with the new line using the variable from variables.yaml
        line: 'REGISTRY_URL="localhost:{{ registry_port }}"'
        state: present
      loop:
        - "/var/containers/registry-service/bin/deploy.sh"
        - "/var/containers/registry-service/bin/registry-images.sh"
        - "/var/containers/registry-service/bin/registry-prune.sh"
        - "/var/containers/registry-service/bin/registry-rmi.sh"
      delegate_to: "{{ registry_hostname }}"
      become: yes

  # Handler to restart the registry service if the htpasswd file was updated
  handlers:
    - name: Restart Registry Service
      ansible.builtin.systemd:
        name: cluster-registry.service
        state: restarted
      delegate_to: "{{ registry_hostname }}"
      become: yes